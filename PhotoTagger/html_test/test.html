<html>
    <head>
        <title>Test</title>
		<style>
			#layout-grid {
				display: grid;
				grid-template-columns: 1fr 1.5fr 1.5fr 1fr;
				grid-template-areas:
					"explorer explorer search search"
					"suggestions suggestions suggestions suggestions"
					"properties viewer viewer results";
				border: 1px solid black;
			}

			#search-filter {
				width: max-content;
			}

			.layout-grid-item {
				padding: 10px;
				border: 1px solid black;

			}

			.filter-cell {
				border: 1px solid black;

				display: grid;

			.filter-info-outer {
				grid-area: info;

				display: grid;
				align-items: center;
			}

			.filter-info-inner {
				width: max-content;
			}

			.filter-children {
				grid-area: children;

				display: grid;
				grid-template-columns: 1fr;
				grid-auto-rows: auto;
			}

			.filter-children button {
				width: max-content;
			}

    <body>
		<div id="layout-grid">
			<div class="layout-grid-item" style="background-color: lightblue; grid-area: explorer; height: 50vh;">
				<h2>File Explorer</h2>
				<div>Current location:&ensp;<span id="current-path">loading</span><br>
					<button onclick="dirnav(-1)">▲ Back</button></div>
				<hr>
				<div id="directories">
					<!-- Directory list will be populated here -->
					<!-- Example: <p><button onclick="dirnav(0)">▼</button>&emsp;Directory Name</p> -->
				</div>
				<hr>
				<div id="files">
					<!-- File list will be populated here -->
					<!-- Example: <p><button onclick="filenav(0)">▣</button>&emsp;File Name</p> -->
				</div>
			</div>
			<div class="layout-grid-item" style="background-color: lightgreen; grid-area: search; height: 50vh;">
				<h2>Search</h2>
				<div id="search-filter">
					<!-- Search filter UI will go here -->
				</div>
				<button onclick="search()">Search in this folder</button>
			</div>
			<div class="layout-grid-item" style="background-color: lightcoral; grid-area: suggestions; height: 3em;">
				View Keyword Suggestions
			</div>
			<div class="layout-grid-item" style="background-color: lightyellow; grid-area: properties; height: 85vh;">
				Name: <span id="file-name">[select an image]</span></br>
				Title: <span id="file-title">[select an image]</span></br>
				Tags: <span id="file-tags">[select an image]</span></br>
			</div>
			<div class="layout-grid-item" style="background-color: lightgray; grid-area: viewer;">
				<img id="file-preview" src="" alt="File preview"
						style="max-width:100%; max-height:80vh; display:none;">
			</div>
			<div class="layout-grid-item" style="background-color: lightpink; grid-area: results;">
				<h2>Results</h2>
				<div id="results-container"></div>
			</div>
		</div>

    </body>
	<!-- initialization -->
	<script>
		DATA_STRING = `
a
	b
		banana.jpg	banana	banana; fruit
		apple.webp	apple	apple; fruit
		grapes.jpg	grape tree	grapes; fruit
	c
		z
		y
		x
		w
		v
		u
		t
		s
		r
		q
		p
	elephant.avif	elephant	elephant; dog
            `

			class HierarchyItem
			{
				constructor(parent, name)
				{
					this.parent = parent;
					this.name = name;
				}

				getPath()
				{
					const path = [];
					let current = this;
					
					while (current)
					{
						path.push(current.name);
						current = current.parent;
					}
					
					return path.reverse().join('/');
				}
			}
			
			class File extends HierarchyItem
			{
				constructor(parent, identifier)
				{
					const parts = identifier.split('\t');
					
					const name = parts[0];
					const title = parts[1] || '';
					const tags = parts[2]?.split(';').map(tag => tag.trim()) || [];

					super(parent, name);
					this.title = title;
					this.tags = tags;
				}
			}

            class Directory extends HierarchyItem
			{
				constructor(parent, name)
				{
					super(parent, name);
					this.directories = [];
					this.files = [];
				}

				// find all files in this directory and subdirectories that satisfy the filter node
				// and return them as a flat list
				search(filterNode)
				{
					let results = [];
					
					for (const file of this.files)
					{
						if (filterNode.evaluate(file.title, file.tags))
						{
							results.push(file);
						}
					}
					
					for (const dir of this.directories)
					{
						results = results.concat(dir.search(filterNode));
					}
					
					return results;
				}
			}

			// extract file hierarchy from the data string, returning the root directory object
			function parseData(dataString)
			{
				const lines = dataString.trim().split('\n');
				const root = new Directory(null, '.'); // root is the local directory
				const stack = [root];
				
				for (const line of lines)
				{
					const indentLevel = line.search(/[^\t]/); // first non-tab character index
					const identifier = line.trim();
					
					while (stack.length > indentLevel + 1) // until the parent is the last item in the stack
					{
						stack.pop();
					}
					
					const parent = stack[stack.length - 1];
					
					if (identifier.includes('\t')) // tabs separate file name, title, and tags
					{
						parent.files.push(new File(parent, identifier));
					}
					else
					{
						const dir = new Directory(parent, identifier);
						parent.directories.push(dir);
						stack.push(dir);
					}
				}
				
				return root;
			}

			const ROOT = parseData(DATA_STRING);
			console.log(ROOT);
	</script>

	<!-- search filtering -->
	<script>
		class FilterNode
		{
			// creates a new leaf filter node (text mode) with the indicated parent
			constructor(parent)
			{
				this.parent = parent;
				this.children = [];
				this.text = "";
				this.operator = null; // only used if not a text node
			}

			// returns true if this node is a text node (i.e. a leaf)
			isText()
			{
				return this.text !== null;
			}

			// sets the text of this node and clears its children (i.e. makes it a leaf)
			// (returns self)
			setText(text)
			{
				this.text = text;
				this.children = [];
				this.operator = null;
				return this;
			}

			// sets the operator of this node and clears its text (i.e. makes it a non-leaf)
			// (automatically adds children if there are noned, and restricts to one child if operator is 'NOT')
			setOperator(operator = "AND")
			{
				if (operator !== "AND" && operator !== "OR" && operator !== "NOT")
				{
					throw new Error("Invalid operator: " + operator);
				}

				this.text = null;
				this.operator = operator; // e.g. 'AND', 'OR', 'NOT'
				if (operator === "NOT")
				{
					if (this.children.length > 1)
					{
						this.children = [this.children[0]];
					}
					else if (this.children.length == 0)
					{
						this.children.push(new FilterNode(this, ""));
					}
				}
				else
				{
					while (this.children.length < 2)
					{
						this.children.push(new FilterNode(this, ""));
					}
				}

				return this;
			}

			// adds a child node with the given text and returns it (requires not a text node)
			// (restricted to one child if operator is 'NOT')
			addChild(text = null)
			{
				if (this.isText())
				{
					throw new Error("Cannot add child to a text node");
				}
				if (this.operator === "NOT" && this.children.length >= 1)
				{
					throw new Error("Cannot add more than one child to a NOT node");
				}
				const child = new FilterNode(this, text);
				this.children.push(child);
				return child;
			}

			// removes this node from its parent's children (if it has a parent)
			removeSelf()
			{
				if (this.parent)
				{
					const index = this.parent.children.indexOf(this);
					if (index !== -1)
					{
						this.parent.children.splice(index, 1);
					}
				}
			}

			// recursively retrieves the node at the given indices path (e.g. [0, 1] for first child's second child),
			// or null if any index is out of bounds
			getRecursive(indices)
			{
				let target = this;
				for (const index of indices)
				{
					if (index >= 0 && index < target.children.length)
					{
						target = target.children[index];
					}
					else
					{
						return null;
					}
				}
				return target;
			}

			// compute the index list for this node (runs up to the parentless node)
			getIndexList()
			{
				const indices = [];
				let current = this;
				while (current.parent)
				{
					const parent = current.parent;
					const index = parent.children.indexOf(current);
					if (index === -1)
					{
						throw new Error("Current node not found in parent's children");
					}
					indices.unshift(index);
					current = parent;
				}
				return indices;
			}

			// recursively evaluates this filter node and its children against the given file;
			// returns 1 if the file matches the filter, 0 if it does not,
			// and 0.5 if the filter is "soft" (because empty filter nodes should always be interpreted permissively);
			// top-level function will round to a boolean value, with 0.5 -> true;
			evaluate(title, tags, isTopLevel = true)
			{
				let result;
				if (this.isText())
				{
					// split filter and title/tags into a list of lowercase keywords with no punctuation
					const processor = s => s.toLowerCase().split(/\W+/).filter(s => s.length > 0);
					const filterKeywords = processor(this.text);
					const titleKeywords = processor(title);
					const tagKeywords = tags.map(processor);
					const allKeygroups = [titleKeywords, ...tagKeywords];

					// loop through keyword groups and find one containing all filter keywords
					if (filterKeywords.length === 0)
					{
						result = 0.5; // empty filter is a "soft" match
					}
					else
					{
						result = allKeygroups.some(group =>
								filterKeywords.every(keyword => group.includes(keyword))
							) ? 1 : 0;
					}
				}
				else
				{
					if (this.operator === "AND") // infimum of children's results (shortcut at 0)
					{
						result = 1;
						for (const child of this.children)
						{
							const r = child.evaluate(title, tags, false);
							if (r < result)
							{
								result = r;
								if (result === 0)
								{
									break;
								}
							}
						}
					}
					else if (this.operator === "OR") // supremum of children's results (shortcut at 1)
					{
						result = 0;
						for (const child of this.children)
						{
							const r = child.evaluate(title, tags, false);
							if (r > result)
							{
								result = r;
								if (result === 1)
								{
									break;
								}
							}
						}
					}
					else if (this.operator === "NOT") // complement of the child result
					{
						result = 1 - this.children[0].evaluate(title, tags, false);
					}
				}

				// if this is the top-level call, round (up) to a boolean value
				if (isTopLevel)
				{
					result = (result > 0);
				}
				return result;
			}

			// return html representation of this node and its children recursively, for UI
			render()
			{
				const address = `rootFilter.getRecursive(${JSON.stringify(this.getIndexList())})`;
				const dashedIndices = this.getIndexList().join('-');
				const deletionButton = (this.parent && this.parent.children.length > 1 ?
					`<button onclick="${address}.removeSelf(); updateFilterUI();">- Delete</button>`
					: `<span></span>`
				);
				const modeChoice =
				`${deletionButton}<br>
				<label>
					<input type="radio" name="mode-${dashedIndices}" onchange="${
					address}.setText(''); updateFilterUI();" ${
					this.isText() ? "checked" : ""}>Text
				</label>
				<label><input type="radio" name="mode-${dashedIndices}" onchange="${
					address}.setOperator('AND'); updateFilterUI();" ${
					!this.isText() ? "checked" : ""}>AND/OR/NOT
				</label><br>`;

				if (this.isText())
				{
					return `<div class="filter-cell">
						<div class="filter-info-outer">
							<div class="filter-info-inner">${
								modeChoice}<input type="text" value="${this.text}" onchange="${
								address}.setText(this.value); updateFilterUI();">
							</div>
						</div>
					</div>`;
				}
				else
				{
					const operatorSelect =
					`<select onchange="${
						address}.setOperator(this.value); updateFilterUI();">
						<option value="AND" ${this.operator === "AND" ? "selected" : ""}>AND</option>
						<option value="OR" ${this.operator === "OR" ? "selected" : ""}>OR</option>
						<option value="NOT" ${this.operator === "NOT" ? "selected" : ""}>NOT</option>
					</select>`;
					const infoHTML =
					`<div class="filter-info-outer">
						<div class="filter-info-inner">${modeChoice}${operatorSelect}</div>
					</div>`;
					const childrenHTML =
						`<div class="filter-children">${this.children.map(child => child.render()).join(`\n`)
							}${this.operator === "NOT" ? `` :
							`<button onclick="${address}.addChild(''); updateFilterUI();">+ Add</button>`}</div>`;
					return `<div class="filter-cell">${infoHTML}\n${childrenHTML}</div>`;
				}
			}
		}


		// example usage:
		const rootFilter = new FilterNode(""); // Name is used in the UI rendering for easy callbacks
		rootFilter.setOperator("AND").children[0].setText("hello");
		rootFilter.children[1].setText("world");
		rootFilter.addChild().setOperator("NOT").children[0].setText("foo");

		function updateFilterUI()
		{
			document.getElementById("search-filter").innerHTML = rootFilter.render();
		}
		updateFilterUI();
		console.log("Double-check the pattern-matching logic against the used keywords!")


	</script>

	<!-- UI Logic -->
	<script>
		let currentDir = ROOT;
		const pathElement = document.getElementById('current-path');
		const dirElement = document.getElementById('directories');
		const fileElement = document.getElementById('files');

		function updateUI()
		{
			// Set the path at the top of the page
			pathElement.textContent = currentDir.getPath() + "/";

			// Set the directory list
			dirElement.innerHTML = (currentDir.directories.length ? 'Subfolders (click to open):</br>' : '');
			currentDir.directories.forEach((dir, index) =>
			{
				const button = document.createElement('button');
				button.onclick = (() => dirnav(index));
				button.innerHTML = dir.name;
				dirElement.appendChild(button);
				dirElement.appendChild(document.createElement('br'));
			});

			// Set the file list
			fileElement.innerHTML = (currentDir.files.length ? 'Images (click to view):</br>' : '');
			currentDir.files.forEach((file, index) =>
			{
				const button = document.createElement('button');
				button.onclick = (() => filenav(index));
				button.innerHTML = file.name;
				fileElement.appendChild(button);
				fileElement.appendChild(document.createElement('br'));
			});
		}

		function dirnav(index)
		{
			if (index === -1 && currentDir.parent)
			{
				currentDir = currentDir.parent;
			}
			else if (index >= 0 && index < currentDir.directories.length)
			{
				currentDir = currentDir.directories[index];
			}
			updateUI();
		}

		function filenav(index)
		{
			if (index >= 0 && index < currentDir.files.length)
			{
				const file = currentDir.files[index];
				document.getElementById('file-name').textContent = file.name;
				document.getElementById('file-title').textContent = file.title;
				document.getElementById('file-tags').textContent = file.tags.join('; ') + (file.tags.length > 0 ? ';' : '');
				document.getElementById('file-preview').src = file.getPath();
				document.getElementById('file-preview').style.display = 'block';
			}
		}

		// function to show search results
		function search()
		{
			const results = currentDir.search(rootFilter);
			const resultsContainer = document.getElementById("results-container");
			resultsContainer.innerHTML = (results.length > 0 ?
				results.map(file => `<p>${file.getPath()}</p>`).join('\n') :
				`<p>No results found</p>`);
		}

		updateUI();
	</script>
